<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=/">
    <script type="text/javascript">
        setTimeout(function() {
            window.location.href = "/";
        }, 3000);
    </script>
    <title>Redirecionando - Seu Juca</title>
    <style>
        :root {
            --primary-color: #ffc107;
            --bg-color: #121212;
            --text-color: #ffffff;
            --text-muted: #888888;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
        }
        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .loader-container {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 0 auto 30px;
        }
        .loader {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 193, 7, 0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-home {
            display: inline-block;
            background-color: var(--primary-color);
            color: #000;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
        .btn-home:active {
            transform: scale(0.96);
        }
        .footer-text {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./assets/img/logo-seujuca.webp" alt="Logo Seu Juca" class="logo">
        
        <h1>Ops! Página não encontrada</h1>
        <p>A página que você procurava não existe mais ou foi movida. Estamos te levando de volta para o início.</p>
        
        <div class="loader-container">
            <div class="loader"></div>
        </div>
        
        <a href="/" class="btn-home">IR PARA A HOME AGORA</a>
        
        <div class="footer-text">
            Seu Juca | Bar e Restaurante
        </div>
    </div>
</body>
</html>
